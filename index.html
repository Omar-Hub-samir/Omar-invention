
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة زفاف عمر ودعاء</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
background:#1f1610;
color:white;
overflow-x:hidden;
}
.hero{
position:relative;
min-height:100vh;
background:url('hero.jpg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}
.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(2px);
}
.content{
position:relative;
z-index:2;
padding:20px;
}
h1{
font-size:72px;
margin:10px 0;
color:#f0d2a2;
}
.subtitle{
font-size:26px;
}
.countdown{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
margin-top:30px;
}
.box{
background:rgba(255,255,255,.15);
padding:20px;
border-radius:20px;
min-width:100px;
backdrop-filter:blur(10px);
}
.box span{
display:block;
font-size:40px;
color:#f7d8a8;
font-weight:bold;
}
.section{
padding:40px 20px;
text-align:center;
}
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
max-width:1000px;
margin:auto;
}
.gallery img{
width:100%;
height:320px;
object-fit:cover;
border-radius:20px;
border:2px solid #c9a46a;
}
.card{
background:rgba(255,255,255,.08);
border:1px solid #c9a46a;
padding:25px;
border-radius:25px;
max-width:700px;
margin:30px auto;
}
.btn{
display:inline-block;
padding:15px 30px;
background:#c9a46a;
color:#111;
text-decoration:none;
border-radius:50px;
font-weight:bold;
margin-top:15px;
}
.music-btn{
position:fixed;
top:20px;
left:20px;
z-index:999;
border:none;
padding:12px 18px;
border-radius:40px;
background:#fff;
cursor:pointer;
font-size:16px;
}
</style>
</head>
<body>

<button class="music-btn" onclick="toggleMusic()">🎵 تشغيل / إيقاف</button>
<audio id="bgMusic" autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<section class="hero">
<div class="overlay"></div>
<div class="content">
<p class="subtitle">وخلقناكم أزواجًا لتسكنوا إليها</p>
<h1>عمر & دعاء</h1>
<p class="subtitle">ندعوكم لحضور حفل زفافنا</p>

<div class="countdown">
<div class="box"><span id="days">0</span>يوم</div>
<div class="box"><span id="hours">0</span>ساعة</div>
<div class="box"><span id="minutes">0</span>دقيقة</div>
<div class="box"><span id="seconds">0</span>ثانية</div>
</div>
</div>
</section>

<section class="section">
<h2>لحظات من قصتنا</h2>
<div class="gallery">
<img src="hero.jpg">
<img src="gallery1.jpg">
<img src="gallery2.jpg">
<img src="gallery3.jpg">
</div>
</section>

<section class="section">
<div class="card">
<h2>تفاصيل الحفل</h2>
<p>الجمعة 16 أكتوبر 2026</p>
<p>الساعة 9:00 مساءً</p>
<p>قاعة Diamond Hall</p>
<a class="btn" target="_blank" href="https://maps.app.goo.gl/RPXMxUht4xTKCKT37?g_st=ic">فتح الخريطة</a>
</div>
</section>

<script>
const targetDate = new Date("2026-10-16T21:00:00").getTime();

setInterval(()=>{
const now = new Date().getTime();
const distance = targetDate - now;

const days = Math.floor(distance / (1000 * 60 * 60 * 24));
const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
const seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("days").innerText = days;
document.getElementById("hours").innerText = hours;
document.getElementById("minutes").innerText = minutes;
document.getElementById("seconds").innerText = seconds;
},1000);

const music = document.getElementById("bgMusic");
function toggleMusic(){
if(music.paused){music.play();}
else{music.pause();}
}

document.body.addEventListener('click', ()=>{
music.play().catch(()=>{});
}, {once:true});
</script>

</body>
</html>
